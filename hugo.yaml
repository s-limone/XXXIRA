title: XXXIRA Wiki

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Game Guides
      pageRef: /docs/guides
      weight: 1
    - name: Getting Started
      pageRef: /docs/getting-started
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/s-limone/XXXIRA"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayCopyright: false
    displayPoweredBy: true
  editURL:
    enable: true
    base: "https://github.com/s-limone/XXXIRA/edit/main/content"
