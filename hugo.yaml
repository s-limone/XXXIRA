title: XXXIRA Wiki
languageCode: en-us
baseURL: https://s-limone.github.io/XXXIRA/

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: monokai

menu:
  main:
    - name: 🎮 Game Guides
      pageRef: /docs/guides
      weight: 1
    - name: 🚀 Getting Started
      pageRef: /docs/getting-started
      weight: 2
    - name: 👥 Characters
      pageRef: /docs/characters
      weight: 3
    - name: 🔍 Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/s-limone/XXXIRA"
      params:
        icon: github

params:
  description: "Knowledge base for the XXXIRA clan in Total Battle - Kingdom 284. Guides, strategies, and resources."
  
  # Navbar settings
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
      width: 40
      height: 40
  
  # Page settings
  page:
    width: wide
  
  # Theme settings
  theme:
    default: dark
    displayToggle: true
  
  # Footer settings
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
      width: 40
      height: 40
  
  # Page settings
  page:
    width: wide
  
  # Theme settings
  theme:
    default: dark
    displayToggle: true
  
  # Footer settings
  footer:
    displayCopyright: false
    displayPoweredBy: true
  editURL:
    enable: true
    base: "https://github.com/s-limone/XXXIRA/edit/main/content"
  
  # Search settings
  search:
    enable: true
    type: flexsearch
    
  # Social links
  social:
    github: "https://github.com/s-limone/XXXIRA"
  
  
  # Custom CSS
  customCSS:
    - css/custom.css

# Taxonomies
taxonomies:
  tag: tags
  category: categories

# Build settings
build:
  writeStats: true

# Output formats
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Sitemap
sitemap:
  changefreq: weekly
  priority: 0.5